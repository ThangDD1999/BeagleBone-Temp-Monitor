<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBB IoT Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50; --temp-color: #e74c3c;
            --hum-color: #3498db; --bg-color: #f4f7f6;
            --alarm-bg: #ffcccc;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; 
            flex-direction: column; align-items: center; 
            background: var(--bg-color); color: var(--primary-color); margin: 0; padding: 20px;
        }
        h1 { margin: 20px 0 30px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; }
        
        .cards { display: flex; gap: 20px; width: 100%; max-width: 1000px; flex-wrap: wrap; justify-content: center; }
        
        .card { 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; 
            flex: 1; min-width: 250px; transition: all 0.3s ease;
            position: relative; border: 2px solid transparent;
        }
        
        /* Alarm Animation */
        @keyframes blink-red {
            0% { background-color: white; }
            50% { background-color: var(--alarm-bg); border-color: var(--temp-color); }
            100% { background-color: white; }
        }
        .alarm-active {
            animation: blink-red 1s infinite;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
        }

        .card h3 { margin: 0; color: #95a5a6; font-size: 14px; text-transform: uppercase; }
        .card h2 { margin: 15px 0 0; font-size: 38px; font-weight: 600; }
        #curr-t { color: var(--temp-color); } #curr-h { color: var(--hum-color); }

        .alarm-text { 
            color: var(--temp-color); font-weight: bold; font-size: 14px; 
            margin-top: 10px; display: none;
        }

        .chart-wrapper {
            width: 95%; max-width: 1000px; margin: 30px auto;
            overflow-x: auto; background: white; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .chart-container { min-width: 800px; height: 450px; padding: 25px; position: relative; }
        .status { margin-top: 15px; font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>
    <h1>BeagleBone Black Monitor</h1>
    
    <div class="cards">
        <div class="card" id="temp-card">
            <h3>Temperature</h3>
            <h2 id="curr-t">--°C</h2>
            <div id="alarm-msg" class="alarm-text">⚠️ WARNING: OVERHEAT (>40°C)</div>
        </div>
        
        <div class="card">
            <h3>Humidity</h3>
            <h2 id="curr-h">--%</h2>
        </div>
    </div>

    <div class="chart-wrapper">
        <div class="chart-container"><canvas id="myChart"></canvas></div>
    </div>

    <div class="status" id="last-update">Connecting...</div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ 
                label: 'Temperature (°C)', data: [], borderColor: '#e74c3c', 
                backgroundColor: 'rgba(231, 76, 60, 0.1)', fill: true, tension: 0.3, 
                borderWidth: 2, pointRadius: 0, pointHoverRadius: 5 
            }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { grid: { display: true, color: 'rgba(0,0,0,0.05)' },
                         ticks: { autoSkip: true, maxTicksLimit: 12 },
                         title: { display: true, text: 'Time (BBB System)' } },
                    y: { grid: { display: true, color: 'rgba(0,0,0,0.05)' },
                         // Back to your original beautiful scale
                         suggestedMin: 25, suggestedMax: 35, 
                         title: { display: true, text: 'Value' } }
                },
                plugins: { legend: { position: 'top' }, tooltip: { mode: 'index', intersect: false } }
            }
        });

        async function update() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    const latest = data.history[data.history.length - 1];
                    const temp = latest.t;
                    const hum = latest.h;

                    document.getElementById('curr-t').innerHTML = temp.toFixed(1) + '°C';
                    document.getElementById('curr-h').innerHTML = hum.toFixed(1) + '%';

                    // Alarm Logic
                    const tempCard = document.getElementById('temp-card');
                    const alarmMsg = document.getElementById('alarm-msg');
                    
                    if (temp > 40.0) {
                        tempCard.classList.add('alarm-active');
                        alarmMsg.style.display = 'block';
                    } else {
                        tempCard.classList.remove('alarm-active');
                        alarmMsg.style.display = 'none';
                    }

                    chart.data.labels = data.history.map(d => {
                        const date = new Date(d.s * 1000);
                        return date.getUTCHours().toString().padStart(2, '0') + ':' + 
                               date.getUTCMinutes().toString().padStart(2, '0') + ':' + 
                               date.getUTCSeconds().toString().padStart(2, '0');
                    });
                    chart.data.datasets[0].data = data.history.map(d => d.t);
                    chart.update('none');

                    document.getElementById('last-update').innerText = 'Last sync: ' + new Date().toLocaleTimeString('en-US');
                }
            } catch (e) { 
                document.getElementById('last-update').innerText = 'Error connecting to BBB!'; 
            }
        }

        update(); 
        setInterval(update, 5000);
    </script>
</body>
</html>
